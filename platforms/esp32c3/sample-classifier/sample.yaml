sample:
  name: MERLIN-V ESP32-C3 packet classifier
  description: >-
    Load a small MERLIN-V program into the runtime on ESP32-C3-DevKitM-1
    and classify two synthetic Ethernet frames.

common:
  tags:
    - merlin
    - platform_esp32c3
  platform_allow:
    - esp32c3_devkitm
  harness: console
  harness_config:
    type: multi_line
    ordered: true
    regex:
      - "classifier: boot on esp32c3"
      - "classifier: loaded id=.* insns=7"
      - "verdict=2 \\(PASS\\)"
      - "verdict=1 \\(DROP\\)"
      - "classifier: done"

tests:
  sample.merlin.platform.esp32c3.classifier: {}
