# Autograder reference manifest for Lab 02.
# Used by `score.py` for cross-checking the per-exercise results.

lab: lab-02
build_target: exercises
test_command: ./exercises
exercises:
  - id: E1
    description: "addi a0, zero, 1"
    expected_encoding: 0x00100513
  - id: E2
    description: "addi a0, zero, -1"
    expected_encoding: 0xfff00513
  - id: E3
    description: "add a0, a0, a1"
    expected_encoding: 0x00b50533
  - id: E4
    description: "lui a0, 0x12345"
    expected_encoding: 0x12345537
  - id: E5
    description: "jalr zero, ra, 0"
    expected_encoding: 0x00008067
  - id: E6
    description: "ecall"
    expected_encoding: 0x00000073
